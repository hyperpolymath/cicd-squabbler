# SPDX-License-Identifier: MPL-2.0
# Instant Forge Sync - Triggers propagation to all forges on push/release
name: Instant Sync
on:
  push:
    branches: [main, master]
  release:
    types: [published]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Gate on secret presence
        id: gate
        env:
          FARM_DISPATCH_TOKEN: ${{ secrets.FARM_DISPATCH_TOKEN }}
        run: |
          if [ -n "${FARM_DISPATCH_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FARM_DISPATCH_TOKEN not set — skipping forge propagation (expected on forks)."
          fi
      # Plain API call instead of peter-evans/repository-dispatch: the repo's
      # selected-actions policy allows only hyperpolymath-owned / GitHub /
      # Marketplace-verified actions, and a two-line gh call needs no action.
      - name: Trigger Propagation
        if: steps.gate.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ secrets.FARM_DISPATCH_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
        run: |
          jq -n --arg repo "$REPO_NAME" --arg ref "$REF" --arg sha "$SHA" \
            '{event_type: "propagate", client_payload: {repo: $repo, ref: $ref, sha: $sha, forges: ""}}' \
          | gh api repos/hyperpolymath/.git-private-farm/dispatches --input -
      - name: Confirm
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: echo "::notice::Propagation triggered for ${REPO_NAME}"
