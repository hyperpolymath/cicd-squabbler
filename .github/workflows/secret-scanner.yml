# SPDX-License-Identifier: MPL-2.0
name: Secret Scanner
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# The reusable's gitleaks job declares pull-requests:write + actions:read; a
# called workflow's job permissions must be a SUBSET of the caller's grant
# (callee ⊆ caller), so the caller grants the union or the run startup-fails
# at plan time with zero jobs.
permissions:
  contents: read
  pull-requests: write
  actions: read
# Single secret scanner. The standards reusable runs gitleaks (+ a Rust-secrets
# check). An inline TruffleHog job previously lived here, but the reusable
# DELIBERATELY retired TruffleHog as redundant (gitleaks gives sufficient
# coverage at lower cost — see the reusable's header). Re-adding it was
# duplicated work, not extra coverage, so it has been removed. See
# .github/workflows/README.adoc.
jobs:
  scan:
    uses: hyperpolymath/standards/.github/workflows/secret-scanner-reusable.yml@a44c93a5cd3d293ee3e8b488444dcdc19c4e5d49
    secrets: inherit
